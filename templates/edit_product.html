<!DOCTYPE html>
<html>
<head>
    <title>Edit Product</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h1>Edit Product</h1>
    <form method="post">
        <label>Name:</label>
        <input type="text" name="name" value="{{ product[1] }}" required>
        
        <label>Category:</label>
        <input type="text" name="category" value="{{ product[2] }}">
        
        <label>Quantity:</label>
        <input type="number" name="quantity" value="{{ product[3] }}" required>
        
        <label>Price:</label>
        <input type="number" step="0.01" name="price" value="{{ product[4] }}" required>
        
        <input type="submit" value="Update Product">
    </form>
    <a href="/">Back to Inventory</a>
</div>
</body>
</html>

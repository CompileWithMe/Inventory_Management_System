<!DOCTYPE html>
<html>
<head>
    <title>Inventory Management</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h1>Inventory Management System</h1>
    <a href="/add">Add Product</a>
    <table>
        <thead>
        <tr>
            <th>ID</th><th>Name</th><th>Category</th><th>Quantity</th><th>Price</th><th>Actions</th>
        </tr>
        </thead>
        <tbody>
        {% for product in products %}
        <tr>
            <td data-label="ID">{{ product[0] }}</td>
            <td data-label="Name">{{ product[1] }}</td>
            <td data-label="Category">{{ product[2] }}</td>
            <td data-label="Quantity">{{ product[3] }}</td>
            <td data-label="Price">{{ product[4] }}</td>
            <td data-label="Actions">
                <a href="/edit/{{ product[0] }}">Edit</a> |
                <a href="/delete/{{ product[0] }}">Delete</a>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
